<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration | LexSupport</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <script>
        (function () {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') document.documentElement.classList.add('dark-mode');
            if (localStorage.getItem('rtl') === 'true') document.documentElement.dir = 'rtl';
        })();
    </script>
</head>
<body
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--background); position: relative; padding: 60px 0;">
    <div class="auth-actions" style="position: absolute; top: 20px; right: 20px; display: flex; gap: 10px;">
        <button class="theme-toggle js-theme-toggle"><i class="ri-moon-line"></i></button><button class="theme-toggle js-rtl-toggle" title="Toggle RTL"><span style="font-size: 0.7rem; font-weight: 800;">RTL</span></button>
    </div>
    <div style="width: 100%; max-width: 480px; padding: 20px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <a href="index.html" class="brand-logo" style="justify-content: center;"><i class="ri-shield-check-line"></i> Lex<span>Support</span></a>
        </div>
        <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
            <h2 style="text-align: center; margin-bottom: 30px; font-size: 1.5rem;">Register New Account</h2>
            <form>
                <div class="row g-3">
                    <div class="col-md-12">
                        <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 6px;">Firm / Organization Name</label>
                        <input type="text" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary);">
                    </div>
                    <div class="col-md-12">
                        <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 6px;">Professional Email</label>
                        <input type="email" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary);">
                    </div>
                    <div class="col-md-12">
                        <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 6px;">Password</label>
                        <div style="position: relative;">
                            <input type="password" class="password-toggle-input" style="width: 100%; padding: 10px; padding-right: 40px; border: 1px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary);">
                            <button type="button" class="password-toggle-btn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--secondary); cursor: pointer; display: flex; align-items: center; padding: 0;">
                                <i class="ri-eye-line" style="font-size: 1.1rem;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 6px;">Confirm Password</label>
                        <div style="position: relative;">
                            <input type="password" class="password-toggle-input" style="width: 100%; padding: 10px; padding-right: 40px; border: 1px solid var(--border); border-radius: 6px; background: var(--background); color: var(--text-primary);">
                            <button type="button" class="password-toggle-btn" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--secondary); cursor: pointer; display: flex; align-items: center; padding: 0;">
                                <i class="ri-eye-line" style="font-size: 1.1rem;"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-12" style="margin-top: 10px;">
                        <label style="display: flex; align-items: flex-start; gap: 10px; font-size: 0.85rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" style="margin-top: 4px;">
                            <span>I agree to the <a href="#" style="color: var(--accent);">Terms of Service</a> and <a href="#" style="color: var(--accent);">Privacy Policy</a> of LexSupport Consulting.</span>
                        </label>
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 30px;">Create Account</button>

                <div style="margin: 25px 0; display: flex; align-items: center; gap: 15px;">
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    <span style="font-size: 0.8rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px;">Or join with</span>
                    <div style="flex: 1; height: 1px; background: var(--border);"></div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button type="button" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--surface);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
                            <path fill="#FBBC05" d="M3.964 10.705A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.705V4.963H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.037l3.007-2.332z"/>
                            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.963l3.007 2.332C4.672 5.164 6.656 3.58 9 3.58z"/>
                        </svg>
                        <span style="color: var(--text-primary); font-weight: 500;">Google</span>
                    </button>
                    <button type="button" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--surface);">
                        <i class="ri-apple-fill" style="color: var(--text-primary); font-size: 1.2rem;"></i>
                        <span style="color: var(--text-primary); font-weight: 500;">Apple</span>
                    </button>
                </div>
            </form>
        </div>
        <p style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--secondary);">Already have an account? <a href="login.html" style="color: var(--accent);">Login here</a></p>
    </div>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/rtl-toggle.js"></script>
    <script>
        document.querySelectorAll('.password-toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                icon.className = type === 'password' ? 'ri-eye-line' : 'ri-eye-off-line';
            });
        });
    </script>
</body>
</html>
